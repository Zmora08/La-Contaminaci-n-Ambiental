    <section class="reporte-contenedor">
    <div class="reporte-caja">
        <h2>Reportar un <span>Problema</span></h2>
        <p>¿Algo no funciona bien? Ayúdanos a mejorar EcoSocial.</p>
        
        <form action="https://formspree.io/f/mlgpgrbo" method="POST">
            
            <div class="campo">
                <label>Tipo de fallo:</label>
                <select name="tipo_error" required>
                    <option value="error-visual">Error visual (Diseño)</option>
                    <option value="enlace-roto">Enlace que no funciona</option>
                    <option value="lentitud">La página carga lento</option>
                    <option value="otro">Otro problema</option>
                </select>
            </div>

            <div class="campo">
                <label>Tu correo (opcional):</label>
                <input type="email" name="email" placeholder="Para contactarte si lo arreglamos">
            </div>

            <div class="campo">
                <label>Descripción del problema:</label>
                <textarea name="descripcion" rows="4" placeholder="Cuéntanos qué pasó..." required></textarea>
            </div>

            <button type="submit" class="btn-reportar">Enviar Reporte</button>
        </form>
    </div>
</section>
